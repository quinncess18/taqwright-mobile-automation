name: Universal Mobile Automation (Android & iOS)

# Mirrors the reference repo (taqelah-mobile-automation): one workflow, two
# independent jobs that run in parallel. Android runs on an ubuntu emulator,
# iOS on a macos simulator. Locally only Android is run (this Windows machine
# can't host the iOS simulator); CI is where both lanes execute together.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    # The taqwright project (config, tests, app/) lives in this subdirectory.
    # NB: this applies to `run:` steps only — the android-emulator-runner action
    # below runs its `script` at the workspace root, so it cd's in explicitly.
    working-directory: taqwright-tests

jobs:
  android-test:
    name: Android (Emulator)
    runs-on: ubuntu-22.04 # Mirrors the reference: dodges the AppArmor bugs in
                          # ubuntu-24.04 that break the emulator.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # taqwright requires Node >=24 to load taqwright.config.ts via Node's
          # native TS type-stripping (the reference's Node 18 would fail here).
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: taqwright-tests/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Appium UiAutomator2 driver
        # Android counterpart of the iOS xcuitest install. The reference ships
        # the driver as an npm dep; we install it explicitly into APPIUM_HOME so
        # the manually-started server (appium.autoStart:false) can find it.
        run: npx appium driver install --source=npm appium-uiautomator2-driver
        env:
          APPIUM_HOME: ${{ github.workspace }}

      - name: Download Android app (.apk)
        # Public pre-release asset — no auth/token needed. buildPath in
        # taqwright.config.ts resolves to app/DemoApp-v1.1.0-debug.apk.
        run: |
          mkdir -p app
          curl -L "https://github.com/taqelah/demo-app/releases/download/v1.1.0/DemoApp-v1.1.0-debug.apk" -o app/DemoApp-v1.1.0-debug.apk
          ls -la app/DemoApp-v1.1.0-debug.apk

      - name: Start Appium server
        # Started manually (taqwright.config.ts android has appium.autoStart:false).
        # Backgrounded; it persists into the emulator-runner step below. The
        # emulator need not exist yet — the server only binds a device when a
        # session starts. The insecure adb_shell feature mirrors the reference
        # (lets helpers shell out via adb if a spec needs it). NB `npx appium`
        # here resolves to Appium 3.x, which changed the --allow-insecure format:
        # the feature must be scoped to a driver (or '*') with a colon, else the
        # server REJECTS the flag and never starts (run 27734085275: bare
        # `adb_shell` crashed startup → every session got ECONNREFUSED).
        run: npx appium --allow-insecure=uiautomator2:adb_shell &
        env:
          APPIUM_HOME: ${{ github.workspace }}

      - name: Wait for Appium ready
        # Mirror the iOS lane's readiness gate. The reference omits this on
        # Android, but it's what makes a server-startup failure fail fast HERE
        # (with a clear message) instead of cascading into N confusing
        # ECONNREFUSED test failures inside the emulator-runner step.
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:4723/status > /dev/null; then echo "Appium up"; exit 0; fi
            sleep 1
          done
          echo "Appium did not come up"; exit 1

      - name: Enable KVM group perms
        # Hardware acceleration for the emulator (mirrors the reference). Uses
        # absolute paths, so the working-directory default is irrelevant here.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android auth tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APPIUM_HOME: ${{ github.workspace }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # The action runs each script LINE as a separate `sh -c`, so a bare
          # `cd` doesn't carry over (the first run failed here: adb install from
          # the workspace root couldn't find app/). Set the cwd for the whole
          # script via the action's own input so relative paths resolve into the
          # taqwright project.
          working-directory: taqwright-tests
          script: |
            # Install the app the noReset session attaches to (a fresh emulator
            # has nothing installed; taqwright with resetBetweenTests:false won't
            # install it for us).
            adb install app/DemoApp-v1.1.0-debug.apk
            # Mirror the reference's CI-emulator mitigations (all `|| true`,
            # harmless to the auth slice if unneeded): grant io.appium.settings
            # location (its ForegroundService needs it on API 34+ or the Appium
            # instrumentation init throws) and suppress system ANR/crash dialogs
            # that can overlay the login fields on a cold-boot runner.
            adb shell pm grant io.appium.settings android.permission.ACCESS_FINE_LOCATION || true
            adb shell pm grant io.appium.settings android.permission.ACCESS_COARSE_LOCATION || true
            adb shell settings put global hide_error_dialogs 1 || true
            # Scope mirrors the iOS lane — auth only for now; grows as each slice
            # gets verified. CI=true is already set by GitHub, but pass it through
            # explicitly so taqwright's retries:CI?2:1 is unambiguous in-script.
            CI=true npx taqwright test --project=android tests/specs/01_auth

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taqwright-report-android
          path: taqwright-tests/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-android
          path: taqwright-tests/test-results/
          retention-days: 30

  ios-test:
    name: iOS (Simulator)
    runs-on: macos-14 # Apple Silicon; matches the .app's arm64 simulator slice.
    # Independent of the Android job — runs in parallel, doesn't block on it.

    env:
      IOS_SIM_NAME: "iPhone 15"
      IOS_SIM_RUNTIME: "iOS-17-5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # taqwright requires Node >=24 — it loads taqwright.config.ts via
          # Node's native TS type-stripping (added in 23+). On 18 the config
          # fails with "Unknown file extension .ts". Engines: >=24.0.0 <26.0.0.
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: taqwright-tests/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install ffmpeg
        # taqwright's `mobile` fixture starts a per-test screen recording
        # (video: 'on-failure' captures every test, discarding on pass), which
        # shells out to ffmpeg. The macos-14 runner has no ffmpeg preinstalled,
        # so without this every iOS test fails in fixture setup at
        # appium/start_recording_screen.
        run: brew install ffmpeg

      - name: Install Appium XCUITest driver
        # Pin to xcuitest@7 — 8.x targets Appium 3.x and conflicts with the
        # Appium 2.x line taqwright drives. (Mirrors the reference repo.)
        run: npx appium driver install --source=npm appium-xcuitest-driver@7
        env:
          APPIUM_HOME: ${{ github.workspace }}

      - name: Download iOS app (.app.zip → app/Runner.app)
        # Public pre-release asset — no auth/token needed. buildPath in
        # taqwright.config.ts resolves to app/Runner.app.
        run: |
          mkdir -p app
          curl -L "https://github.com/taqelah/demo-app/releases/download/v1.1.0/DemoApp-v1.1.0-debug-ios.app.zip" -o app/DemoApp-v1.1.0-debug-ios.app.zip
          unzip -q -o app/DemoApp-v1.1.0-debug-ios.app.zip -d app/
          ls -la app/Runner.app | head -5

      - name: Boot iOS Simulator
        id: boot-sim
        run: |
          # Resolve the UDID of a preinstalled iPhone 15; create one if absent.
          UDID=$(xcrun simctl list devices "${IOS_SIM_NAME}" available --json \
            | python3 -c "import sys,json; d=json.load(sys.stdin)['devices']; print(next((dev['udid'] for rt,devs in d.items() if 'iOS' in rt for dev in devs if dev['name']=='${IOS_SIM_NAME}'), ''))")
          if [ -z "$UDID" ]; then
            echo "No preinstalled ${IOS_SIM_NAME}; creating one"
            UDID=$(xcrun simctl create "${IOS_SIM_NAME}" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "com.apple.CoreSimulator.SimRuntime.${IOS_SIM_RUNTIME}")
          fi
          echo "Simulator UDID: $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Pre-install app to Simulator
        run: xcrun simctl install "${{ steps.boot-sim.outputs.udid }}" app/Runner.app

      - name: Build & pre-install WebDriverAgent
        # Option (b): skip the runtime xcodebuild entirely. build-wda compiles
        # WDA once, up front; we then locate the built runner app and pre-install
        # it on the booted simulator. taqwright.config.ts (CI-gated on the env
        # exported here) sets appium:usePreinstalledWDA + appium:prebuiltWDAPath,
        # which makes the xcuitest driver LAUNCH the preinstalled runner via
        # simctl/XCTRunner with NO xcodebuild at session time. The first session
        # then starts in seconds instead of cold-building WDA (~4min) — that cold
        # build is what overran the 180s per-test timeout and made TC-L01 abort
        # on attempt 1 and only pass on a retry.
        #
        # Why this over the earlier tries: appium:usePrebuiltWDA (run 27667598454)
        # still drives WDA via `xcodebuild test-without-building` → code 70; the
        # appium.connectionTimeout:300s bump (run 27691328617) was moot because
        # the 180s TEST timeout fires first. usePreinstalledWDA is the only path
        # that removes xcodebuild from the session (iOS 17+ only; our sim is 17.5).
        #
        # build-wda takes --name/--sdk only and writes to the standard
        # ~/Library/Developer/Xcode/DerivedData/WebDriverAgent-<hash> dir; we
        # resolve the runner .app under Build/Products/Debug-iphonesimulator and
        # export its path + the booted udid (which also pins the session, since
        # the config's /iPhone 15/ regex would otherwise match iPhone 15 Pro too).
        run: |
          npx appium driver run xcuitest build-wda --name "${IOS_SIM_NAME}" --sdk "17.5"
          WDA_DD=$(ls -dt "${HOME}/Library/Developer/Xcode/DerivedData/"WebDriverAgent-* | head -1)
          WDA_APP="${WDA_DD}/Build/Products/Debug-iphonesimulator/WebDriverAgentRunner-Runner.app"
          if [ ! -d "${WDA_APP}" ]; then
            echo "WDA runner app not found at ${WDA_APP}"
            ls -la "${WDA_DD}/Build/Products/Debug-iphonesimulator/" || true
            exit 1
          fi
          echo "Prebuilt WDA runner: ${WDA_APP}"
          # Pre-install so the driver's session-time launch is instant (moves the
          # install cost out of the timed session).
          xcrun simctl install "${{ steps.boot-sim.outputs.udid }}" "${WDA_APP}"
          echo "IOS_WDA_APP_PATH=${WDA_APP}" >> "$GITHUB_ENV"
          echo "IOS_SIM_UDID=${{ steps.boot-sim.outputs.udid }}" >> "$GITHUB_ENV"
        env:
          APPIUM_HOME: ${{ github.workspace }}

      - name: Start Appium server
        # Started manually (taqwright.config.ts has appium.autoStart:false).
        run: npx appium &
        env:
          APPIUM_HOME: ${{ github.workspace }}

      - name: Wait for Appium ready
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:4723/status > /dev/null; then echo "Appium up"; exit 0; fi
            sleep 1
          done
          echo "Appium did not come up"; exit 1

      - name: Run iOS auth tests
        # Scope grows as more slices get iOS selectors verified (mirrors the
        # reference repo's incremental iOS coverage matrix). Auth only for now.
        run: npx taqwright test --project=ios tests/specs/01_auth

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taqwright-report-ios
          path: taqwright-tests/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-ios
          path: taqwright-tests/test-results/
          retention-days: 30
